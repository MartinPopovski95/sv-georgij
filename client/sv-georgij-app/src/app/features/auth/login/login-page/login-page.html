<div class="admin-container" id="adminContainer">
  <!-- Login Section - Left Side -->
  <div class="login-section">
    <div class="welcome-header">
      <h1 class="welcome-title">
        Добредојде
        <span class="emoji">👋</span>
      </h1>
      <p class="welcome-subtitle">
        Најави се за да започнеш со управување на твоите проекти.
      </p>
    </div>

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">

      @if (errorMessage()) {
        <div class="error-message">{{ errorMessage() }}</div>
      }

      <!-- @if (successMessage()) {
        <div class="success-message">{{ successMessage() }}</div>
      } -->

      <div class="form-group">
        <label class="form-label">Корисничко име</label>
        <input
          type="text"
          class="form-input"
          placeholder="Корисничко име"
          formControlName="username"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Лозинка</label>
        <input
          type="password"
          class="form-input"
          placeholder="Најмалку 8 карактери"
          formControlName="password"
          autocomplete="current-password"
        />
      </div>

      <button
        type="submit"
        class="sign-in-btn"
        [disabled]="loading()"
      >
        {{ loading() ? 'Најавување...' : 'Најави се' }}
      </button>

    </form>
  </div>

  <!-- Image Section - Right Side -->
  <div class="image-section">
    <img class="church-image" src="/assets/admin-assets/login-page/login-image.jpg" alt="Црква" />
  </div>
</div>
