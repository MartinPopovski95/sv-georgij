<aside class="admin-sidebar">
  <!-- Toggle button -->
  <button class="sidebar-toggle" (click)="toggle()" title="Toggle sidebar">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <!-- Brand -->
  <div class="sidebar-brand">
    <span class="brand-icon">♱</span>
    <span class="brand-text">Св. Георгиј</span>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" title="Dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a routerLink="/admin/posts" [queryParams]="{ category: 'Blog' }" routerLinkActive="active" [routerLinkActiveOptions]="{ queryParams: 'exact', paths: 'exact', fragment: 'ignored', matrixParams: 'ignored' }" title="Блог">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="8" y1="13" x2="16" y2="13"></line>
        <line x1="8" y1="17" x2="16" y2="17"></line>
      </svg>
      <span class="nav-label">Блог</span>
    </a>
    <a routerLink="/admin/posts" [queryParams]="{ category: 'Events' }" routerLinkActive="active" [routerLinkActiveOptions]="{ queryParams: 'exact', paths: 'exact', fragment: 'ignored', matrixParams: 'ignored' }" title="Настани">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">Настани</span>
    </a>
    <a routerLink="/admin/posts" [queryParams]="{ category: 'News' }" routerLinkActive="active" [routerLinkActiveOptions]="{ queryParams: 'exact', paths: 'exact', fragment: 'ignored', matrixParams: 'ignored' }" title="Новости">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v2H4a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        <line x1="10" y1="7" x2="18" y2="7"/>
        <line x1="10" y1="11" x2="18" y2="11"/>
        <line x1="10" y1="15" x2="14" y2="15"/>
      </svg>
      <span class="nav-label">Новости</span>
    </a>
    <a routerLink="/admin/posts" [queryParams]="{ category: 'Catechism' }" routerLinkActive="active" [routerLinkActiveOptions]="{ queryParams: 'exact', paths: 'exact', fragment: 'ignored', matrixParams: 'ignored' }" title="Катехизис">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      <span class="nav-label">Катехизис</span>
    </a>
    <a routerLink="/admin/gallery" routerLinkActive="active" title="Галерија">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      <span class="nav-label">Галерија</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="sidebar-user-info">
      <div class="user-avatar">{{ userInitial() }}</div>
      <span class="nav-label">{{ userName() }}</span>
    </div>
    <button class="logout-btn" (click)="logout()" title="Одјава">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span class="nav-label">Одјава</span>
    </button>
  </div>
</aside>
