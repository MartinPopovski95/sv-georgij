<p>floating-editor-toolbar works!</p>
<div
          class="floating-toolbar"
          id="floatingToolbar"
          style="display: none"
        >
          <!-- Undo/Redo Controls -->
          <button class="float-btn" data-command="undo" title="Undo (Ctrl+Z)">
            ↶
          </button>
          <button class="float-btn" data-command="redo" title="Redo (Ctrl+Y)">
            ↷
          </button>
          <div class="toolbar-separator"></div>
          <button class="float-btn" data-command="bold" title="Bold">
            <strong>B</strong>
          </button>
          <button class="float-btn" data-command="italic" title="Italic">
            <em>I</em>
          </button>
          <button class="float-btn" data-command="underline" title="Underline">
            <u>U</u>
          </button>
          <div class="toolbar-separator"></div>
          <button
            class="float-btn"
            data-command="justifyLeft"
            title="Align Left"
          >
            <span class="align-icon">≡</span>
          </button>
          <button
            class="float-btn"
            data-command="justifyCenter"
            title="Align Center"
          >
            <span class="align-icon">≡</span>
          </button>
          <button
            class="float-btn"
            data-command="justifyRight"
            title="Align Right"
          >
            <span class="align-icon">≡</span>
          </button>
          <button class="float-btn" data-command="justifyFull" title="Justify">
            <span class="align-icon">≡</span>
          </button>
          <div class="toolbar-separator"></div>
          <!-- Font Size Controls -->
          <button
            class="float-btn"
            data-command="increaseFontSize"
            title="Increase Font Size"
          >
            A+
          </button>
          <button
            class="float-btn"
            data-command="decreaseFontSize"
            title="Decrease Font Size"
          >
            A-
          </button>
          <div class="toolbar-separator"></div>
          <!-- List Controls -->
          <button
            class="float-btn"
            data-command="insertOrderedList"
            title="Numbered List"
          >
            1.
          </button>
          <button
            class="float-btn"
            data-command="insertUnorderedList"
            title="Bullet List"
          >
            •
          </button>
          <div class="toolbar-separator"></div>
          <!-- Additional Text Controls -->
          <button
            class="float-btn"
            data-command="strikeThrough"
            title="Strikethrough"
          >
            <s>S</s>
          </button>
          <button class="float-btn" data-command="subscript" title="Subscript">
            X₂
          </button>
          <button
            class="float-btn"
            data-command="superscript"
            title="Superscript"
          >
            X²
          </button>
          <div class="toolbar-separator"></div>
          <!-- Color Controls -->
          <button class="float-btn" data-command="textColor" title="Text Color">
            <span class="text-color-button">A</span>
          </button>
          <button
            class="float-btn"
            data-command="backgroundColor"
            title="Highlight Text"
          >
            <span class="highlight-button">H</span>
          </button>
          <div class="toolbar-separator"></div>
          <!-- Text Formatting Controls -->
          <button
            class="float-btn"
            data-command="indent"
            title="Increase Indent"
          >
            →
          </button>
          <button
            class="float-btn"
            data-command="outdent"
            title="Decrease Indent"
          >
            ←
          </button>
          <button
            class="float-btn"
            data-command="blockquote"
            title="Quote/Citation"
          >
            ❝
          </button>
          <div class="toolbar-separator"></div>
          <!-- Spacing Controls -->
          <button
            class="float-btn"
            data-command="increaseLetterSpacing"
            title="Increase Letter Spacing"
          >
            A ↔ A
          </button>
          <button
            class="float-btn"
            data-command="decreaseLetterSpacing"
            title="Decrease Letter Spacing"
          >
            A↔A
          </button>
          <button
            class="float-btn"
            data-command="increaseLineHeight"
            title="Increase Line Height"
          >
            ⋮↕
          </button>
          <button
            class="float-btn"
            data-command="decreaseLineHeight"
            title="Decrease Line Height"
          >
            ⋮↕
          </button>
          <div class="toolbar-separator"></div>
          <button
            class="float-btn"
            data-command="insertImage"
            title="Insert Image"
          >
            📷
          </button>
          <button
            class="float-btn"
            data-command="removeImage"
            title="Remove Image"
          >
            🗑️
          </button>
          <div class="toolbar-separator"></div>
          <button class="float-btn publish-btn" id="publishBtn">Објави</button>
        </div>
