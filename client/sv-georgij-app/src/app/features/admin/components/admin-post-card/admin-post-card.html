<!-- <p>admin-post-card works!</p> -->
 <div class="blog-card-wrapper">
   <article class="blog-card" [class]="cardType()">

     <!-- Publish status badge (top-right corner) -->
     <div class="status-badge" [class.published]="isPublished()" [class.draft]="!isPublished()">
       {{ isPublished() ? 'Објавено' : 'Нацрт' }}
     </div>

     <!-- Admin action overlay (shown on hover) -->
     <div class="admin-overlay">
       <a class="action-btn edit-btn" [routerLink]="['/admin/posts', post().id, 'edit']">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
           <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
         </svg>
         Уреди
       </a>
       <button class="action-btn delete-btn" (click)="delete.emit(post().id)">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <polyline points="3 6 5 6 21 6"/>
           <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
           <path d="M10 11v6M14 11v6"/>
           <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
         </svg>
         Избриши
       </button>
     </div>

     <div class="card-image"
       [style.background-image]="'url(' + (post().imageUrl || 'assets/new-logo.png') + ')'">
     </div>
     <div class="card-content">
       <div class="card-meta">
         <span class="card-category">{{ post().categoryName | categoryLabel }}</span>
         <span class="card-date">{{ post().publishedAt | localeDate }}</span>
       </div>
       <h2 class="card-title">{{ post().title }}</h2>
       <p class="card-excerpt" [innerHTML]="safeContent()"></p>
       <div class="card-author">
         <img src="assets/content-assets/author.svg" alt="Author" class="author-avatar">
         <span class="author-name">{{ post().author }}</span>
       </div>
     </div>
   </article>
 </div>
