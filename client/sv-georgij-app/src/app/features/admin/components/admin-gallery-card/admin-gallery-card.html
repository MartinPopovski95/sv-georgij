<div class="blog-card-wrapper">
  <div class="blog-card gallery-card" [class]="cardType()" [class.single-image]="!secondItem()">

    <div class="admin-image-wrapper card-image">
      <img class="card-image-img" [src]="firstItem().url" [alt]="firstItem().fileName">
      <div class="admin-image-overlay">
        <button class="delete-btn" (click)="deleteRequested.emit(firstItem().id)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
          Избриши
        </button>
      </div>
    </div>

    @if (secondItem()) {
      <div class="admin-image-wrapper card-content gallery-second-image">
        <img class="card-image-img" [src]="secondItem()!.url" [alt]="secondItem()!.fileName">
        <div class="admin-image-overlay">
          <button class="delete-btn" (click)="deleteRequested.emit(secondItem()!.id)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
            Избриши
          </button>
        </div>
      </div>
    }

  </div>
</div>
