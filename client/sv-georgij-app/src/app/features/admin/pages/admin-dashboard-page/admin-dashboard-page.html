<div class="dashboard-page">

  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">Dashboard</h1>
  </div>

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-value">{{ totalPosts() }}</span>
      <span class="stat-label">Вкупно постови</span>
    </div>
    <div class="stat-card published">
      <span class="stat-value">{{ publishedPosts() }}</span>
      <span class="stat-label">Објавени</span>
    </div>
    <div class="stat-card draft">
      <span class="stat-value">{{ draftPosts() }}</span>
      <span class="stat-label">Нацрти</span>
    </div>
  </div>

  <!-- Quick actions -->
  <h2 class="section-title">Брз пристап</h2>
  <div class="actions-grid">
    <a class="action-card" routerLink="/admin/posts" [queryParams]="{ category: 'Blog' }">
      <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="16" y2="17"/>
      </svg>
      <span class="action-label">Блог</span>
    </a>
    <a class="action-card" routerLink="/admin/posts" [queryParams]="{ category: 'Events' }">
      <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="action-label">Настани</span>
    </a>
    <a class="action-card" routerLink="/admin/posts" [queryParams]="{ category: 'News' }">
      <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v2H4a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        <line x1="10" y1="7" x2="18" y2="7"/>
        <line x1="10" y1="11" x2="18" y2="11"/>
        <line x1="10" y1="15" x2="14" y2="15"/>
      </svg>
      <span class="action-label">Новости</span>
    </a>
    <a class="action-card" routerLink="/admin/posts" [queryParams]="{ category: 'Catechism' }">
      <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      <span class="action-label">Катехизис</span>
    </a>
    <a class="action-card" routerLink="/admin/gallery">
      <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span class="action-label">Галерија</span>
    </a>
  </div>

</div>
