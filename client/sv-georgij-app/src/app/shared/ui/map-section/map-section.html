<div class="map" id="map-section">
          <iframe
            [src]="mapsEmbedUrl"
            width="100%"
            height="100%"
            class="google-map-iframe"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
          <div class="map-border"></div>
</div>
